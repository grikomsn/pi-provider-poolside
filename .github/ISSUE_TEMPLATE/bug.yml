name: Bug report
description: Report a reproducible provider problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include API keys, private prompts, or other sensitive data. Report vulnerabilities through the security policy instead.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I am using the latest package version.
          required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: pi-version
    attributes:
      label: Pi version
      description: Run `pi --version`.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Node.js, operating system, and environment
      placeholder: Node 24; macOS 26; local terminal
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Poolside model
      description: Leave blank if the problem occurs before model selection.

  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe what happened and how often.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run …
        2. Select …
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics or logs
      description: Paste relevant output after removing API keys, prompts, and personal data.
      render: text
