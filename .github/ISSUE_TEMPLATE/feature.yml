name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for this request.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should be improved?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior you want and how it would help.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional workarounds or other approaches.
