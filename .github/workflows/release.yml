name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Changesets and npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm supports trusted publishing
        run: node -e "const v=require('node:child_process').execFileSync('npm',['--version'],{encoding:'utf8'}).trim(); const [major,minor]=v.split('.').map(Number); if (major < 11 || (major === 11 && minor < 5)) throw new Error('npm 11.5.1 or newer is required, found '+v)"

      - name: Install dependencies
        run: npm ci

      - name: Create or update version pull request
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: npm run version
          commit: 'chore: version package'
          title: 'chore: version package'
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release version
        if: steps.changesets.outputs.hasChangesets == 'false'
        id: release
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if ! npm view pi-provider-poolside version >/dev/null 2>&1; then
            echo "::warning::Bootstrap pi-provider-poolside on npm, configure its trusted publisher, then rerun this workflow."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
          if npm view "pi-provider-poolside@${version}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate package
        if: steps.release.outputs.release == 'true' || steps.release.outputs.publish == 'true'
        run: npm run check && npm run package

      - name: Publish to npm with trusted publishing
        if: steps.release.outputs.publish == 'true'
        run: npm publish --access public --provenance

      - name: Create GitHub release
        if: steps.release.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.release.outputs.tag }}" \
            --generate-notes
